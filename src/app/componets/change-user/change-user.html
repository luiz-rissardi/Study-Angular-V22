<section class="card-3d">
    <h2>Meu Formulário</h2>
    <form (submit)="this.onSubmit($event)">
        <fieldset class="input-group">
            <label for="userName">User name</label>
            <input type="text" id="userName" [formField]="this.userForm.userName">
        </fieldset>

        <fieldset class="input-group">
            <label for="email"> email</label>
            <input type="text" id="email" [formField]="this.userForm.email">

            @if(userForm.email().touched()){
            @if(userForm.email().invalid()){
            <span class="input-invalid"> {{ userForm.email().errors()[0].message }} </span>
            }
            }
        </fieldset>

        <fieldset class="input-group">
            <label for="password"> password </label>
            <input type="text" id="password" [formField]="this.userForm.password">

            @if(userForm.password().touched()){
            @if(userForm.password().invalid()){
            <span class="input-invalid"> {{ userForm.password().errors()[0].message }} </span>
            }
            }
        </fieldset>

        <fieldset class="input-group">
            <label for="age"> age </label>
            <input type="number" id="age" [formField]="this.userForm.age">
        </fieldset>

        <fieldset class="input-group">
            <label for="userType"> userType </label>
            <select id="userType" [formField]="userForm.userType">
                <option value="" disabled>Select a product</option>
                <option value="0"> deafult </option>
                <option value="1"> vip </option>
            </select>
        </fieldset>

        <button class="btn btn-primary" [disabled]="!userForm().valid() || userForm().submitting()" type="submit">
            @if(!userForm().submitting()){
            Enviar
            }@else {
            Enviando...
            }
        </button>
    </form>
</section>
