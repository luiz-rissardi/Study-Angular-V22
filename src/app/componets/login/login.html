<section class="card-3d">
    <h2>Meu Formulário</h2>
    @if(invalidCredentials()){
    <div class="error-credentials mb-3">
        <p> nome de usuário ou senha incorretos !</p>
    </div>
    }
    <form (submit)="this.onSubmit($event)">
        <fieldset class="input-group">
            <label for="userName">User name</label>
            <input type="text" id="userName" [formField]="this.userLoginForm.userName">
        </fieldset>

        <fieldset class="input-group">
            <label for="password"> password </label>
            <input type="text" id="password" [formField]="this.userLoginForm.password">

            @if(userLoginForm.password().touched()){
            @if(userLoginForm.password().invalid()){
            <span class="input-invalid"> {{ userLoginForm.password().errors()[0].message }} </span>
            }
            }
        </fieldset>

        <button class="btn btn-primary" [disabled]="!userLoginForm().valid() || userLoginForm().submitting()"
            type="submit">
            @if(!userLoginForm().submitting()){
            Enviar
            }@else {
            Enviando...
            }
        </button>
    </form>
</section>
